name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '3 * * * *' # 毎時3分に実行
  workflow_dispatch: # 手動実行を許可

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload
        uses: withastro/action@v3
        # ここで自動的に npm install & npm run build が行われます
        env:
              # ここでGitHubのSecretを環境変数として注入します
              SOURCE_URL: ${{ secrets.SOURCE_URL }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4